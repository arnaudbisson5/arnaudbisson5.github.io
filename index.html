<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirect</title>
</head>
<body>

<script>
  // Si Supabase ajoute un token → dashboard
  if (window.location.hash.includes('access_token')) {
    window.location.href = '/water/' + window.location.hash;
  } else {
    // Sinon toujours aller sur l’app (login géré dedans)
    window.location.href = '/water/';
  }
</script>

</body>
</html>
